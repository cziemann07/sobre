<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analogias | Literatura e TI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="analogias.css">
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <div id="site-header-placeholder"></div>

    <main class="analogias-main">
        <section class="analogias-hero">
            <div class="hero-content">
                <span class="hero-tag"></span>
                <h2 class="hero-titulo">Literatura <span class="operador">↔</span> Tecnologia</h2>
                <p class="hero-subtitulo">
                    Onde Machado de Assis debugga state machines<br>
                    e Jorge Amado arquiteta sistemas distribuidos.
                </p>
                <div class="hero-linha"></div>
            </div>
        </section>

        <section id="container-analogias" class="grade-analogias">
            <p class="loading-msg">
                <span class="loading-cursor">█</span> Compilando analogias...
            </p>
        </section>
    </main>

    <div id="modal-analogia" class="modal-analogia">
        <div class="modal-analogia-content">
            <button id="btn-close-analogia" class="btn-close-analogia">
                <i class="bx bx-x"></i>
            </button>

            <div class="modal-analogia-header">
                <span id="modal-tag" class="modal-tag-tech"></span>
                <h2 id="modal-titulo-art"></h2>
                <p class="modal-meta">
                    <span id="modal-livro-nome"></span> - <span id="modal-autor-nome"></span>
                </p>
            </div>

            <div class="modal-analogia-body">
                <p id="modal-texto-analogia"></p>
            </div>
        </div>
    </div>

    <div id="site-footer-placeholder"></div>

    <script src="site.js"></script>
    <script src="analogias.js"></script>
</body>
</html>
